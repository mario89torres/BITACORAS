<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bitácora Lab{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --is-blue:   #1B4F9B;
      --is-blue2:  #163D7A;
      --is-orange: #F7941D;
      --is-green:  #6ABD45;
      --bs-primary: #1B4F9B;
      --bs-primary-rgb: 27,79,155;
    }
    body { background: #F0F5FB; font-family: 'Segoe UI', system-ui, sans-serif; }
    .navbar { background: var(--is-blue) !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .navbar-logo { height: 36px; filter: brightness(0) invert(1); }
    .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-header { border-radius: 14px 14px 0 0 !important; }
    .btn-primary  { background: var(--is-blue);   border-color: var(--is-blue); }
    .btn-primary:hover { background: var(--is-blue2); border-color: var(--is-blue2); }
    .btn-orange   { background: var(--is-orange); border-color: var(--is-orange); color: #fff; font-weight: 700; }
    .btn-orange:hover { background: #e0830a; border-color: #e0830a; color: #fff; }
    .bg-primary   { background-color: var(--is-blue) !important; }
    .text-primary { color: var(--is-blue) !important; }
    .badge.bg-primary { background-color: var(--is-blue) !important; }
    .badge-buena   { background: var(--is-green); color: #fff; }
    .badge-regular { background: #F57F17; color: #fff; }
    .badge-danada  { background: #C62828; color: #fff; }
    .estado-badge {
      display: inline-block; padding: .25em .7em;
      border-radius: 20px; font-size: .8em; font-weight: 600;
    }
    .is-divider { border-top: 3px solid var(--is-orange); width: 48px; margin: .5rem 0 1rem; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg shadow-sm mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
      <img src="https://i.ibb.co/TxX8FMb3/image-664.png" alt="Innova Schools" class="navbar-logo">
      <span class="vr opacity-50 mx-1"></span>
      <span style="font-size:.95rem; letter-spacing:.03em;">Bitácora Lab</span>
    </a>
    <div class="ms-auto">
      <a href="/nueva" class="btn btn-orange btn-sm px-3">
        <i class="bi bi-plus-circle me-1"></i> Nueva sesión
      </a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
